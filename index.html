<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dezeen UK Jobs (Outside London)</title>
<style>
  :root {
    --bg: #f7f8fa;
    --card: #ffffff;
    --border: #e2e6ed;
    --accent: #1a1a2e;
    --accent2: #e63946;
    --text: #1d1d1f;
    --muted: #6b7280;
    --row-alt: #f0f4f9;
    --link: #2563eb;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    background: var(--accent);
    color: #fff;
    padding: 28px 40px 24px;
    display: flex;
    align-items: flex-end;
    gap: 16px;
  }
  header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; }
  header h1 span { color: var(--accent2); }
  header p { font-size: 0.82rem; color: #a0aec0; margin-top: 4px; }
  .badge {
    margin-left: auto;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    color: #fff;
    font-size: 0.75rem;
    padding: 4px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .toolbar {
    padding: 20px 40px 0;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .toolbar input {
    flex: 1;
    min-width: 200px;
    padding: 9px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.875rem;
    background: var(--card);
    outline: none;
  }
  .toolbar input:focus { border-color: var(--link); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  .toolbar select {
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 0.875rem;
    background: var(--card);
    outline: none;
    cursor: pointer;
  }
  #count { font-size: 0.82rem; color: var(--muted); margin-left: auto; white-space: nowrap; }

  .table-wrap { padding: 16px 40px 40px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  thead tr { background: var(--accent); color: #fff; }
  thead th { padding: 12px 16px; text-align: left; font-size: 0.78rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; white-space: nowrap; user-select: none; }
  thead th:hover { background: #2d2d4e; }
  thead th.sort-asc::after { content: " ↑"; }
  thead th.sort-desc::after { content: " ↓"; }

  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:nth-child(even) { background: var(--row-alt); }
  tbody tr:hover { background: #e8f0fe; }
  tbody td { padding: 11px 16px; font-size: 0.875rem; vertical-align: middle; }
  td.date { color: var(--muted); font-size: 0.8rem; white-space: nowrap; }
  td.title { font-weight: 600; }
  td.location { color: var(--muted); font-size: 0.82rem; }
  td.salary { font-size: 0.82rem; color: var(--muted); }
  td.link a { color: var(--link); text-decoration: none; font-size: 0.82rem; }
  td.link a:hover { text-decoration: underline; }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty p { margin-top: 8px; font-size: 0.875rem; }

  .updated { text-align: center; padding: 12px; font-size: 0.78rem; color: var(--muted); border-top: 1px solid var(--border); }

  @media (max-width: 700px) {
    header { padding: 20px; }
    .toolbar { padding: 16px 20px 0; }
    .table-wrap { padding: 12px 20px 32px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>Dezeen Jobs &mdash; <span>UK Outside London</span></h1>
    <p>Architecture &amp; design roles tracked every 3 days from Dezeen Jobs</p>
  </div>
  <div class="badge" id="last-updated">Updated: —</div>
</header>

<div class="toolbar">
  <input type="text" id="search" placeholder="Search jobs, companies, locations…" oninput="filterTable()">
  <select id="location-filter" onchange="filterTable()">
    <option value="">All locations</option>
  </select>
  <span id="count"></span>
</div>

<div class="table-wrap">
  <table id="jobs-table">
    <thead>
      <tr>
        <th onclick="sortTable(0)">Date Added</th>
        <th onclick="sortTable(1)">Location</th>
        <th onclick="sortTable(2)">Company</th>
        <th onclick="sortTable(3)">Job Title</th>
        <th onclick="sortTable(4)">Salary</th>
        <th>Link</th>
      </tr>
    </thead>
    <tbody id="jobs-body">
      <!-- populated by jobs-data.js -->
    </tbody>
  </table>
</div>

<div class="updated" id="footer-updated"></div>

<script src="jobs-data.js"></script>
<script>
  let sortCol = 0, sortDir = -1; // default: newest first

  function renderTable(data) {
    const tbody = document.getElementById('jobs-body');
    if (!data || data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="empty"><strong>No listings yet.</strong><p>The tracker will populate this page on its next run.</p></td></tr>';
      document.getElementById('count').textContent = '0 listings';
      return;
    }
    tbody.innerHTML = data.map(r => `
      <tr>
        <td class="date">${r.date || ''}</td>
        <td class="location">${r.location || ''}</td>
        <td>${r.company || ''}</td>
        <td class="title">${r.title || ''}</td>
        <td class="salary">${r.salary || ''}</td>
        <td class="link">${r.link ? `<a href="${r.link}" target="_blank" rel="noopener">View →</a>` : ''}</td>
      </tr>`).join('');
    document.getElementById('count').textContent = `${data.length} listing${data.length !== 1 ? 's' : ''}`;
  }

  function filterTable() {
    const q = document.getElementById('search').value.toLowerCase();
    const loc = document.getElementById('location-filter').value.toLowerCase();
    const filtered = (window.JOBS_DATA || []).filter(r => {
      const text = [r.date, r.location, r.company, r.title, r.salary].join(' ').toLowerCase();
      const matchQ = !q || text.includes(q);
      const matchL = !loc || (r.location || '').toLowerCase().includes(loc);
      return matchQ && matchL;
    });
    renderTable(filtered);
  }

  function sortTable(col) {
    const headers = document.querySelectorAll('thead th');
    headers.forEach(h => h.classList.remove('sort-asc', 'sort-desc'));
    if (sortCol === col) { sortDir *= -1; } else { sortCol = col; sortDir = 1; }
    headers[col].classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
    const keys = ['date', 'location', 'company', 'title', 'salary', 'link'];
    window.JOBS_DATA.sort((a, b) => {
      const av = (a[keys[col]] || '').toLowerCase();
      const bv = (b[keys[col]] || '').toLowerCase();
      return av < bv ? -sortDir : av > bv ? sortDir : 0;
    });
    filterTable();
  }

  function init() {
    const data = window.JOBS_DATA || [];

    // Populate location filter
    const locs = [...new Set(data.map(r => r.location).filter(Boolean))].sort();
    const sel = document.getElementById('location-filter');
    locs.forEach(l => {
      const o = document.createElement('option');
      o.value = l.toLowerCase(); o.textContent = l;
      sel.appendChild(o);
    });

    // Show last updated
    const updated = window.JOBS_UPDATED || null;
    if (updated) {
      document.getElementById('last-updated').textContent = 'Updated: ' + updated;
      document.getElementById('footer-updated').textContent = 'Last updated: ' + updated;
    }

    // Default sort: newest first
    data.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
    renderTable(data);
  }

  init();
</script>
</body>
</html>
